# MCPize manifest - https://mcpize.com
version: 1
name: axiom-mcp
description: >-
  Financial & research data MCP server — SEC filings, DeFi analytics, wallet profiling,
  academic papers, US macro data, patent search, and token sentiment. 30 tools for AI agents.
runtime: typescript
entry: adapters/mcp-server/server.ts
build:
  install: npm install
  command: npm run build
startCommand:
  type: stdio
  command: tsx
  args:
    - adapters/mcp-server/server.ts
